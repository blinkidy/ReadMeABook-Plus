name: Pre-Release Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'codex/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Backend Tests
    uses: ./.github/workflows/run-tests.yml
    with:
      send_notification: false

  docker-build:
    name: Unified Docker Build
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Capture version information
        id: version
        run: |
          echo "app_version=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build unified Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile.unified
          platforms: linux/amd64
          push: false
          tags: readmeabook-plus:pre-release
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
